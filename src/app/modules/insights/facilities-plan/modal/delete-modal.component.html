<div *transloco="let t">
  <div class="mt-4 flex gap-4" mat-dialog-title>
    <mat-icon class="text-current icon-size-5" svgIcon="fa-solid:trash-can"></mat-icon>
    <div class="text-2xl font-medium leading-6">{{ t('Delete Plan Run') }}</div>
  </div>
  <mat-divider></mat-divider>

  <mat-dialog-content>
    <p>
      {{ t('Are you sure you want to delete?') }} <strong>{{ data.run.name }}</strong>
    </p>
    <p class="mt-1 text-sm text-gray-500 dark:text-gray-400">{{ t('This action cannot be undone.') }}</p>
  </mat-dialog-content>

  <mat-dialog-actions align="end">
    <button (click)="close()" mat-button>{{ t('Cancel') }}</button>
    <button [disabled]="isDeleting" (click)="delete()" mat-flat-button color="warn">
      {{ isDeleting ? t('Deleting…') : t('Delete') }}
    </button>
  </mat-dialog-actions>
</div>
