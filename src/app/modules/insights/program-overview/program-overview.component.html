<seed-page 
  [config]="{ 
    title: 'Program Overview',
    titleIcon: 'fa-solid:chart-simple',
    action: openProgramConfig,
    actionIcon: 'fa-solid:gears',
    actionText: 'Program Configuration',
  }"
>
  <div class="content m-5">

    <div>
      <mat-form-field class="w-1/3">
        <mat-label class="text-lg text-secondary">Programs</mat-label>
        <mat-select [(value)]="selectedProgram">
          @for (program of programs; track $index) {
            <mat-option [value]="program">
              {{ program.name }}
            </mat-option>
          }
        </mat-select>
      </mat-form-field>
    </div>

    <mat-divider></mat-divider>

    <div>
      {{ selectedProgram | json}}
    </div>

  </div>
</seed-page>
